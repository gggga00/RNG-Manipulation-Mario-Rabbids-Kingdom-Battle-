name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: RNG_tool-windows.exe
          - os: ubuntu-latest
            output: RNG_tool-linux
          - os: macos-latest
            output: RNG_tool-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          g++ -std=c++20 -O2 RNG_tool.cpp -o RNG_tool.exe
          move RNG_tool.exe ${{ matrix.output }}

      - name: Build Linux/macOS
        if: runner.os != 'Windows'
        run: |
          g++ -std=c++20 -O2 RNG_tool.cpp -o RNG_tool
          mv RNG_tool ${{ matrix.output }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.output }}
