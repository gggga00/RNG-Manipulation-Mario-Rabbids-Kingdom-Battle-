name: Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: g++ -std=c++20 -O2 RNG_tool.cpp -o RNG_tool

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: g++ -std=c++20 -O2 RNG_tool.cpp -o RNG_tool.exe
